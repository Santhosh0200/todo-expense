<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6d5efc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0c0f" media="(prefers-color-scheme: dark)" />
    <title>Offline — Fluxa</title>
    <style>
      :root {
        --bg: #f6f6f7;
        --fg: #18181b;
        --muted: #71717a;
        --surface: #ffffff;
        --border: #e7e7eb;
        --primary: #6d5efc;
        --primary-hover: #5b4cf0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0c0f;
          --fg: #f4f4f5;
          --muted: #a1a1aa;
          --surface: #16181d;
          --border: #2a2d36;
          --primary: #8b7cff;
          --primary-hover: #9d90ff;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .logo { width: 64px; height: 64px; margin: 0 auto 20px; }
      h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0 0 24px; }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: var(--primary);
        color: #ffffff;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 22px;
        border-radius: 12px;
        transition: background 0.15s ease;
      }
      button:hover { background: var(--primary-hover); }
      .hint { margin-top: 18px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fluxa">
        <defs>
          <linearGradient id="g" x1="3" y1="2" x2="29" y2="30" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8B7CFF" />
            <stop offset="1" stop-color="#5B4CF0" />
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="8.5" fill="url(#g)" />
        <g transform="translate(5 0) skewX(-9)" fill="#ffffff">
          <rect x="8.5" y="6" width="4.6" height="20" rx="2.3" />
          <rect x="8.5" y="6" width="13" height="4.6" rx="2.3" />
          <rect x="8.5" y="13.4" width="9" height="4.6" rx="2.3" />
        </g>
      </svg>
      <h1>You're offline</h1>
      <p>Fluxa can't reach the network right now. Check your connection and try again — your data is safe.</p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">Fluxa will reconnect automatically once you're back online.</p>
    </div>
    <script>
      // Auto-reload as soon as connectivity returns.
      window.addEventListener("online", function () {
        location.reload();
      });
    </script>
  </body>
</html>
